<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>私人教练 | Sky Portal</title>
<style>
  :root {
    --bg: #0a0a0f;
    --card-bg: rgba(255,255,255,0.04);
    --card-hover: rgba(255,255,255,0.08);
    --border: rgba(255,255,255,0.08);
    --text: #e8e8ed;
    --text-dim: #8888a0;
    --accent: #6c8aff;
    --accent-glow: rgba(108,138,255,0.15);
    --pink: #f472b6;
    --orange: #fb923c;
    --green: #4ade80;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }
  .hero { text-align: center; padding: 60px 20px 20px; position: relative; }
  .hero::before {
    content: ''; position: absolute; top: 0; left: 50%;
    transform: translateX(-50%); width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(244,114,182,0.12) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }
  .hero h1 { font-size: 2.4em; font-weight: 700; position: relative; z-index: 1; }
  .hero p { color: var(--text-dim); font-size: 1.05em; margin-top: 10px; position: relative; z-index: 1; }
  .container { max-width: 800px; margin: 0 auto; padding: 0 20px 60px; }
  .back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--text-dim); text-decoration: none; font-size: 0.9em; margin-bottom: 20px; transition: color 0.2s; }
  .back-link:hover { color: var(--accent); }

  .topic-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    text-decoration: none;
    color: var(--text);
    display: flex;
    align-items: flex-start;
    gap: 20px;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
    margin-bottom: 16px;
  }
  .topic-card:hover {
    background: var(--card-hover);
    border-color: var(--pink);
    transform: translateY(-3px);
    box-shadow: 0 8px 30px rgba(244,114,182,0.1);
  }
  .topic-icon { font-size: 2.5em; flex-shrink: 0; }
  .topic-info { flex: 1; }
  .topic-title { font-size: 1.2em; font-weight: 600; margin-bottom: 4px; }
  .topic-desc { color: var(--text-dim); font-size: 0.9em; line-height: 1.5; margin-bottom: 12px; }
  .topic-meta {
    display: flex;
    gap: 16px;
    font-size: 0.8em;
    color: var(--text-dim);
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }
  .topic-meta span { display: flex; align-items: center; gap: 4px; }
  .badge { display: inline-block; padding: 2px 10px; border-radius: 6px; font-size: 0.75em; font-weight: 500; }
  .badge-active { background: rgba(74,222,128,0.15); color: var(--green); }
  .badge-count { background: rgba(244,114,182,0.15); color: var(--pink); }
  .arrow { color: var(--text-dim); font-size: 1.2em; align-self: center; flex-shrink: 0; }

  .coming-soon {
    background: var(--card-bg);
    border: 1px dashed var(--border);
    border-radius: 16px;
    padding: 28px;
    text-align: center;
    color: var(--text-dim);
    font-size: 0.95em;
    margin-top: 8px;
  }
  .coming-soon .emoji { font-size: 1.5em; margin-bottom: 8px; display: block; }

  .footer { text-align: center; padding: 30px 20px; color: var(--text-dim); font-size: 0.82em; border-top: 1px solid var(--border); margin-top: 40px; }
  .footer a { color: var(--accent); text-decoration: none; }
  .footer a:hover { text-decoration: underline; }

  @media (max-width: 640px) {
    .hero h1 { font-size: 1.8em; }
    .topic-card { flex-direction: column; gap: 12px; }
  }
</style>
</head>
<body>

<div class="container">
  <a class="back-link" href="../index.html">← Sky Portal</a>

  <div class="hero">
    <h1>🧠 私人教练</h1>
    <p>晓波的个人知识库 · 认知升级从每天一课开始</p>
  </div>

  <!--芒格误判心理学 -->
  <a class="topic-card" href="munger.html">
    <div class="topic-icon">📖</div>
    <div class="topic-info">
      <div class="topic-title">芒格误判心理学 · 每日一课</div>
      <div class="topic-desc">查理·芒格的25条人类误判心理学原则，融入罗振宇阅读十问框架。每天一条，从认知层面改变自己。</div>
      <div class="topic-meta">
        <span class="badge badge-count">11 课</span>
        <span>📅 2026-04-19 开课</span>
        <span>🔄 最近更新 2026-04-29</span>
        <span class="badge badge-active">进行中</span>
      </div>
    </div>
    <div class="arrow">→</div>
  </a>

  <!-- 未来可扩展 -->
  <div class="coming-soon">
    <span class="emoji">🔮</span>
    更多主题即将上线 · 投资心理学 · 决策模型 · 思维工具箱 ...
  </div>

  <div class="footer">
    <a href="../index.html">Sky Portal</a> · 晓波的数字空间 · 私人教练 v1.0
  </div>
</div>

</body>
</html>
