<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📡 研报中心 — Sky Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --sidebar-bg: #0f0f18;
  --content-bg: #0a0a0f;
  --card: rgba(255,255,255,0.04);
  --card-hover: rgba(255,255,255,0.08);
  --border: rgba(255,255,255,0.08);
  --text: #e0e0e8;
  --text-dim: #6b6b80;
  --accent: #f0a040;
  --accent-glow: rgba(240,160,64,0.12);
  --green: #4ade80;
  --blue: #6c8aff;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Noto Sans SC', -apple-system, sans-serif;
  background: var(--bg); color: var(--text);
  height: 100vh; overflow: hidden;
}
.layout {
  display: grid;
  grid-template-columns: 260px 1fr;
  height: 100vh;
}

/* ── Sidebar ── */
.sidebar {
  background: var(--sidebar-bg);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden;
}
.sidebar-header {
  padding: 24px 20px 16px;
  border-bottom: 1px solid var(--border);
}
.sidebar-header h1 {
  font-size: 1.15em; font-weight: 700;
  color: var(--accent);
  display: flex; align-items: center; gap: 8px;
}
.sidebar-header .home-link {
  font-size: 0.78em; color: var(--text-dim);
  text-decoration: none; margin-top: 6px; display: block;
}
.sidebar-header .home-link:hover { color: var(--accent); }
.sidebar-nav {
  flex: 1; overflow-y: auto; padding: 12px 0;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.1) transparent;
}
.month-group { margin-bottom: 4px; }
.month-label {
  font-size: 0.72em; font-weight: 600;
  color: var(--text-dim); text-transform: uppercase;
  letter-spacing: 0.08em;
  padding: 8px 20px 4px;
  font-family: 'JetBrains Mono', monospace;
  cursor: pointer; user-select: none;
  display: flex; align-items: center; gap: 6px;
}
.month-label::before {
  content: '▸'; font-size: 0.8em;
  transition: transform 0.2s;
}
.month-group.open .month-label::before { transform: rotate(90deg); }
.month-dates { display: none; }
.month-group.open .month-dates { display: block; }
.date-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 20px 8px 28px;
  cursor: pointer; transition: all 0.15s;
  border-left: 3px solid transparent;
  font-size: 0.88em;
}
.date-item:hover {
  background: var(--card-hover);
}
.date-item.active {
  background: var(--accent-glow);
  border-left-color: var(--accent);
  color: var(--accent);
  font-weight: 500;
}
.date-item .day {
  font-family: 'JetBrains Mono', monospace;
  font-size: 1.1em; font-weight: 600;
  width: 28px; text-align: center;
}
.date-item .weekday {
  font-size: 0.78em; color: var(--text-dim);
}
.date-item.active .weekday { color: var(--accent); opacity: 0.7; }
.badge-new {
  font-size: 0.6em; background: var(--accent);
  color: #000; padding: 1px 5px; border-radius: 3px;
  font-weight: 700; margin-left: auto;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

/* ── Content ── */
.content-area {
  display: flex; flex-direction: column;
  overflow: hidden;
}
.content-toolbar {
  padding: 12px 24px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px;
  background: rgba(255,255,255,0.02);
}
.content-toolbar .current-date {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.9em; color: var(--accent); font-weight: 600;
}
.content-toolbar .nav-btn {
  background: var(--card); border: 1px solid var(--border);
  color: var(--text-dim); padding: 4px 10px;
  border-radius: 6px; cursor: pointer; font-size: 0.82em;
  transition: all 0.15s;
}
.content-toolbar .nav-btn:hover {
  background: var(--card-hover); color: var(--text);
}
.content-toolbar .nav-btn:disabled {
  opacity: 0.3; cursor: not-allowed;
}
.report-frame {
  flex: 1; border: none; width: 100%;
  background: var(--content-bg);
}
.empty-state {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  color: var(--text-dim); gap: 12px;
}
.empty-state .icon { font-size: 3em; opacity: 0.3; }
.empty-state p { font-size: 0.95em; }

/* ── Mobile ── */
@media (max-width: 768px) {
  .layout { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
  .sidebar {
    height: auto; max-height: 45vh;
    border-right: none; border-bottom: 1px solid var(--border);
  }
  .sidebar-nav { max-height: 35vh; }
}
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <h1>📡 研报中心</h1>
      <a class="home-link" href="../index.html">← 返回 Sky Portal</a>
    </div>
    <nav class="sidebar-nav" id="nav"></nav>
  </aside>
  <main class="content-area">
    <div class="content-toolbar">
      <button class="nav-btn" id="prevBtn" onclick="navigateDay(-1)">◀ 前一天</button>
      <span class="current-date" id="currentDate">—</span>
      <button class="nav-btn" id="nextBtn" onclick="navigateDay(1)">后一天 ▶</button>
    </div>
    <iframe class="report-frame" id="reportFrame"></iframe>
    <div class="empty-state" id="emptyState" style="display:none">
      <div class="icon">📡</div>
      <p>选择左侧日期查看研报</p>
    </div>
  </main>
</div>

<script>
// Report registry — append new dates here each day
// Format: 'YYYY-MM-DD'
const REPORTS = [
  '2026-04-05',
];

const WEEKDAYS_ZH = ['日','一','二','三','四','五','六'];

let currentIndex = 0;

function init() {
  // Group by month
  const months = {};
  REPORTS.forEach(d => {
    const key = d.substring(0, 7); // YYYY-MM
    if (!months[key]) months[key] = [];
    months[key].push(d);
  });

  const nav = document.getElementById('nav');
  // Sort months descending (newest first)
  const sortedMonths = Object.keys(months).sort().reverse();

  sortedMonths.forEach((monthKey, mi) => {
    const [y, m] = monthKey.split('-');
    const group = document.createElement('div');
    group.className = 'month-group' + (mi === 0 ? ' open' : '');

    const label = document.createElement('div');
    label.className = 'month-label';
    label.textContent = `${y} 年 ${parseInt(m)} 月`;
    label.onclick = () => group.classList.toggle('open');
    group.appendChild(label);

    const dates = document.createElement('div');
    dates.className = 'month-dates';

    // Sort dates descending within month
    months[monthKey].sort().reverse().forEach(dateStr => {
      const dt = new Date(dateStr + 'T12:00:00');
      const day = dt.getDate();
      const wd = WEEKDAYS_ZH[dt.getDay()];
      const isLatest = dateStr === REPORTS[REPORTS.length - 1];
      const idx = REPORTS.indexOf(dateStr);

      const item = document.createElement('div');
      item.className = 'date-item';
      item.dataset.index = idx;
      item.innerHTML = `
        <span class="day">${day}</span>
        <span class="weekday">周${wd}</span>
        ${isLatest ? '<span class="badge-new">NEW</span>' : ''}
      `;
      item.onclick = () => loadReport(idx);
      dates.appendChild(item);
    });

    group.appendChild(dates);
    nav.appendChild(group);
  });

  // Load latest
  loadReport(REPORTS.length - 1);
}

function loadReport(index) {
  if (index < 0 || index >= REPORTS.length) return;
  currentIndex = index;
  const dateStr = REPORTS[index];
  const filename = `report-${dateStr}.html`;

  document.getElementById('reportFrame').src = filename;
  document.getElementById('reportFrame').style.display = 'block';
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('currentDate').textContent = dateStr;
  document.getElementById('prevBtn').disabled = (index === 0);
  document.getElementById('nextBtn').disabled = (index === REPORTS.length - 1);

  // Update active state
  document.querySelectorAll('.date-item').forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.index) === index);
  });
}

function navigateDay(delta) {
  loadReport(currentIndex + delta);
}

init();
</script>
</body>
</html>
