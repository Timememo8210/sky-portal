<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📊 每日行情 Daily Market — Sky Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --sidebar-bg: #0f0f18;
  --content-bg: #0a0a0f;
  --card: rgba(255,255,255,0.04);
  --card-hover: rgba(255,255,255,0.08);
  --border: rgba(255,255,255,0.08);
  --text: #e0e0e8;
  --text-dim: #6b6b80;
  --accent: #4ade80;
  --accent-glow: rgba(74,222,128,0.12);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Noto Sans SC', -apple-system, sans-serif;
  background: var(--bg); color: var(--text);
  height: 100vh; overflow: hidden;
}
body.lang-zh .en { display:none !important; }
body.lang-en .zh { display:none !important; }

.layout {
  display: grid;
  grid-template-columns: 260px 1fr;
  height: 100vh;
}

/* ── Lang Toggle ── */
.lang-toggle {
  display: flex;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 100px;
  overflow: hidden;
  margin-top: 10px;
}
.lang-toggle button {
  padding: 4px 12px; border: none; background: transparent;
  color: var(--text-dim); font-size: 0.72rem; cursor: pointer;
  transition: all 0.25s; font-family: inherit;
}
.lang-toggle button.active { background: var(--accent); color: #000; }

/* ── Sidebar ── */
.sidebar {
  background: var(--sidebar-bg);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden;
}
.sidebar-header {
  padding: 24px 20px 16px;
  border-bottom: 1px solid var(--border);
}
.sidebar-header h1 {
  font-size: 1.15em; font-weight: 700;
  color: var(--accent);
  display: flex; align-items: center; gap: 8px;
}
.sidebar-header .home-link {
  font-size: 0.78em; color: var(--text-dim);
  text-decoration: none; margin-top: 6px; display: block;
}
.sidebar-header .home-link:hover { color: var(--accent); }
.sidebar-nav {
  flex: 1; overflow-y: auto; padding: 12px 0;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.1) transparent;
}
.month-group { margin-bottom: 4px; }
.month-label {
  padding: 6px 20px; font-size: 0.75em;
  color: var(--text-dim); font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.05em;
}
.report-link {
  display: block; padding: 8px 20px;
  text-decoration: none; color: var(--text);
  font-size: 0.85em; transition: all 0.2s;
  border-left: 3px solid transparent;
}
.report-link:hover {
  background: var(--card); border-left-color: var(--accent);
}
.report-link .date { font-family: 'JetBrains Mono', monospace; font-weight: 600; }
.report-link .tag {
  font-size: 0.72em; padding: 2px 6px;
  border-radius: 4px; margin-left: 6px;
}
.tag-us { background: rgba(74,222,128,0.15); color: #4ade80; }
.tag-cn { background: rgba(251,146,60,0.15); color: #fb923c; }
.tag-both { background: rgba(96,165,250,0.15); color: #60a5fa; }

/* ── Content ── */
.content {
  overflow-y: auto; padding: 40px;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.1) transparent;
}
.welcome {
  text-align: center; padding: 80px 20px;
}
.welcome .icon { font-size: 4em; margin-bottom: 16px; }
.welcome h2 { font-size: 1.5em; color: var(--accent); }
.welcome p { color: var(--text-dim); margin-top: 8px; font-size: 0.95em; }

/* ── Responsive ── */
@media (max-width: 768px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar { display: none; }
  .content { padding: 20px; }
}
</style>
</head>
<body class="lang-zh">
<div class="layout">
  <div class="sidebar">
    <div class="sidebar-header">
      <h1>📊 <span class="zh">每日行情</span><span class="en" style="display:none">Daily Market</span></h1>
      <a href="../index.html" class="home-link">← <span class="zh">返回 Sky Portal</span><span class="en" style="display:none">Back to Sky Portal</span></a>
      <div class="lang-toggle">
        <button class="active" onclick="document.body.className='lang-zh';localStorage.setItem('lang','zh')">中文</button>
        <button onclick="document.body.className='lang-en';localStorage.setItem('lang','en')">EN</button>
      </div>
    </div>
    <div class="sidebar-nav" id="report-list">
      <div class="welcome" style="padding:40px 16px;text-align:center;">
        <div class="icon">📊</div>
        <p style="color:var(--text-dim);font-size:0.85em;"><span class="zh">每日行情将从 2026-04-14 开始</span><span class="en" style="display:none">Daily market reports start from 2026-04-14</span></p>
      </div>
    </div>
  </div>
  <div class="content">
    <div class="welcome">
      <div class="icon">📊</div>
      <h2><span class="zh">每日行情</span><span class="en" style="display:none">Daily Market</span></h2>
      <p><span class="zh">美股 · A股 · 港股 — 每天晚上9点自动更新</span><span class="en" style="display:none">US · China · HK — Updated daily at 9 PM</span></p>
      <p style="margin-top:16px;font-size:0.85em;color:var(--text-dim);">
        <span class="zh">由 Sky ☁️ 自动生成 · <a href="../index.html" style="color:var(--accent);">返回首页</a></span>
        <span class="en" style="display:none">Auto-generated by Sky ☁️ · <a href="../index.html" style="color:var(--accent);">Home</a></span>
      </p>
    </div>
  </div>
</div>
<script>
(function(){
  var l=localStorage.getItem('lang');
  if(l==='en') document.body.className='lang-en';
})();
</script>
</body>
</html>
